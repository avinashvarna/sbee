<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

	<link rel="stylesheet" href="static/styles.css">

    <title>SBee</title>
  </head>
  <body onload="init()">
    <div class="container m-1">
      <div class="row">
        <div class="col">
          <div class="d-flex justify-content-between align-items-center mb-2 px-1">
            <h3 class="m-0 fw-bold text-primary">SBee</h3>
            <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-toggle="modal" data-bs-target="#statsModal" onclick="showStats()">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-bar-chart-fill" viewBox="0 0 16 16">
                <path d="M1 11a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1zm5-4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v7a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1zm5-5a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1h-2a1 1 0 0 1-1-1z"/>
              </svg>
              Stats
            </button>
          </div>
          <div class="card">
            <div class="card-body">
              <h4 class="card-title"><b>{{ data['centerLetter'] }}</b> {{ data['outerLetters'] }} </h4>
              <input class="form-control" id="inputWords"></input>
              <button type="button" class="btn btn-primary m-1" onclick="update()">Submit</button>
              <div id="liveAlertPlaceholder"></div>
            </div>
          </div>
          <div class="card">
            <div class="card-body">
			  <div class="progress-container" style="position: relative; margin-top: 30px;">
				<div id="amazingMark" class="level-mark" style="position: absolute; bottom: 100%; height: 20px; border-right: 2px solid #0d6efd; z-index: 1;">
				  <span style="position: absolute; bottom: 20px; right: -20px; font-size: 12px;">Amazing</span>
				</div>
				<div id="geniusMark" class="level-mark" style="position: absolute; bottom: 100%; height: 20px; border-right: 2px solid #28a745; z-index: 1;">
				  <span style="position: absolute; bottom: 20px; right: -20px; font-size: 12px;">Genius</span>
				</div>
				<div class="progress" style="height: 30px;">
				  <div id="scoreProgressBar" class="progress-bar bg-info" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
					<span id="scoreProgressBarLabel" class="progress-bar-label">0%</span>
				  </div>
				</div>
			  </div>
			  <div id="queenBeeBanner" class="queen-bee-banner" style="display: none;">You are the Queen Bee!</div>
              <h5 class="card-title" id="score">Score: 0</h5>
              <p class="card-text" id="levelsPlaceholder">:</p>
              <p class="card-text" id="foundCountPlaceholder">Found:</p>
              <p class="card-text" id="foundWords"></p>
            </div>
          </div>
          <div class="card">
            <div class="card-body">
                <button type="button" class="btn btn-danger m-1" onclick="toggleVisibility('hints')">Hints</button>
                <div id="hints" class="d-none">
                </div>
                <button type="button" class="btn btn-danger m-1" onclick="toggleVisibility('answers')">Answers</button>
                <div id="answers" class="d-none">
                </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src={{ url_for("static", filename="sbee.js") }}></script>
    <script>
        const answers = new Set("{{ data['answers'] }}".split(/\s+/g));
        const pangrams = new Set("{{ data['pangrams'] }}".split(/\s+/g));
		const puzzle_id = "{{ data['id'] }}";
    </script>

    <!-- Stats Modal -->
    <div class="modal fade" id="statsModal" tabindex="-1" aria-labelledby="statsModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title fw-bold" id="statsModalLabel">STATISTICS</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body text-center">
            <!-- Summary Stats Grid -->
            <div class="row mb-4">
              <div class="col-4">
                <h2 id="statGamesPlayed" class="fw-bold m-0">0</h2>
                <small class="text-muted text-uppercase" style="font-size: 11px;">Played</small>
              </div>
              <div class="col-4">
                <h2 id="statWinRate" class="fw-bold m-0">0%</h2>
                <small class="text-muted text-uppercase" style="font-size: 11px;">Amazing+</small>
              </div>
              <div class="col-4">
                <h2 id="statGeniusRate" class="fw-bold m-0">0%</h2>
                <small class="text-muted text-uppercase" style="font-size: 11px;">Genius+</small>
              </div>
            </div>

            <hr>

            <h6 class="fw-bold mb-3 text-start text-uppercase" style="font-size: 13px; letter-spacing: 0.5px;">Level Breakdown</h6>
            
            <!-- Stats Breakdown List -->
            <div class="text-start">
              <div class="mb-3">
                <div class="d-flex justify-content-between mb-1" style="font-size: 14px;">
                  <span>Amazing</span>
                  <span id="amazingDetails" class="text-muted">0</span>
                </div>
                <div class="progress" style="height: 12px;">
                  <div id="barAmazingNoHints" class="progress-bar bg-success" role="progressbar" style="width: 0%;"></div>
                  <div id="barAmazingWithHints" class="progress-bar bg-warning" role="progressbar" style="width: 0%;"></div>
                </div>
              </div>

              <div class="mb-3">
                <div class="d-flex justify-content-between mb-1" style="font-size: 14px;">
                  <span>Genius</span>
                  <span id="geniusDetails" class="text-muted">0</span>
                </div>
                <div class="progress" style="height: 12px;">
                  <div id="barGeniusNoHints" class="progress-bar bg-success" role="progressbar" style="width: 0%;"></div>
                  <div id="barGeniusWithHints" class="progress-bar bg-warning" role="progressbar" style="width: 0%;"></div>
                </div>
              </div>

              <div class="mb-3">
                <div class="d-flex justify-content-between mb-1" style="font-size: 14px;">
                  <span>Queen Bee</span>
                  <span id="queenDetails" class="text-muted">0</span>
                </div>
                <div class="progress" style="height: 12px;">
                  <div id="barQueenNoHints" class="progress-bar bg-success" role="progressbar" style="width: 0%;"></div>
                  <div id="barQueenWithHints" class="progress-bar bg-warning" role="progressbar" style="width: 0%;"></div>
                </div>
              </div>
            </div>
            
            <!-- Legend -->
            <div class="d-flex justify-content-center gap-3 mt-3" style="font-size: 12px;">
              <div class="d-flex align-items-center gap-1">
                <span style="display: inline-block; width: 12px; height: 12px; border-radius: 2px;" class="bg-success"></span>
                <span class="text-muted">No Hints</span>
              </div>
              <div class="d-flex align-items-center gap-1">
                <span style="display: inline-block; width: 12px; height: 12px; border-radius: 2px;" class="bg-warning"></span>
                <span class="text-muted">With Hints</span>
              </div>
            </div>
            
            <!-- Reset Button -->
            <div class="mt-4 pt-2 border-top">
              <button type="button" class="btn btn-outline-danger btn-sm" onclick="resetStats()">Reset Stats</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
